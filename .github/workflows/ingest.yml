name: Daily Mutual Fund Ingestion

on:
  schedule:
    # Runs at 04:30 UTC (10:00 IST) every day
    - cron: '30 4 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  ingest:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Data Pipeline (Ingestion & Embedding)
        env:
          PYTHONPATH: .
        run: |
          echo "Starting Phase 1: Ingestion Pipeline"
          python src/ingestion/run.py
          echo "Starting Phase 2: Index Building"
          python src/index/builder.py

      - name: Commit updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: Auto-update mutual fund data [skip ci]" && git push)
